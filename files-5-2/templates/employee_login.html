{% extends "base.html" %}
{% block title %}Employee Login - Ennojoum{% endblock %}
{% block content %}
<section class="login-page">
    <div class="login-card fade-in">
        <h2>Employee Login</h2>
        <p class="muted">Sign in to manage car washes</p>
        <form method="POST" action="{{ url_for('employee_login') }}" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. admin1" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <div class="hint">
            <small>Default credentials: <strong>admin1 / 1234</strong></small>
        </div>
        <a href="{{ url_for('home') }}" class="back-link">&larr; Back to home</a>
    </div>
</section>
{% endblock %}
